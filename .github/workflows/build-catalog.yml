name: 自動重建 catalog.md

# 每次 push（除了只改 catalog.md 本身）就掃全 repo 重建 catalog.md。
# 用預設 GITHUB_TOKEN 推送，不會再觸發自己 → 不會無限迴圈。
on:
  push:
    branches: [ main ]
    paths-ignore:
      - 'catalog.md'
  workflow_dispatch: {}          # 也可到 Actions 頁手動按「Run workflow」

permissions:
  contents: write                # 讓 Action 有權把 catalog.md 推回 repo

concurrency:
  group: build-catalog
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: 產生 catalog.md
        run: node .github/scripts/build-catalog.mjs

      - name: 有變更才 commit
        run: |
          if [[ -n "$(git status --porcelain catalog.md)" ]]; then
            git config user.name  "github-actions[bot]"
            git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
            git add catalog.md
            git commit -m "chore: 自動重建 catalog.md [skip ci]"
            git push
            echo "✅ catalog.md 已更新並推送"
          else
            echo "ℹ️ catalog.md 無變更，跳過"
          fi
